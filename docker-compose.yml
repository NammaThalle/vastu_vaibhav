# 
services:
  backend:
    container_name: vastu_backend_dev
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./frontend:/frontend
      - ./config:/app/config
      - ./data:/data
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/vastu.db
      FRONTEND_URL: http://frontend:3000
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000","http://localhost:8000","http://127.0.0.1:8000"]'
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      PUPPETEER_SKIP_DOWNLOAD: "true"
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
    depends_on:
      - frontend

  frontend:
    container_name: vastu_frontend_dev
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev -- --hostname 0.0.0.0
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_PROXY_URL: http://backend:8000
      PUPPETEER_SKIP_DOWNLOAD: "true"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"

volumes:
  frontend_node_modules:
